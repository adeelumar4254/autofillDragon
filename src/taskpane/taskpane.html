<!doctype html>
<html lang="en" data-framework="typescript">

<head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=Edge" />
    <title>Booking builder</title>

   
    <script>
        window._historyBackup = {
            pushState: window.history.pushState,
            replaceState: window.history.replaceState
        };
    </script>

    <!-- 2. LOAD OFFICE.JS -->
    <script type="text/javascript" src="https://appsforoffice.microsoft.com/lib/1.1/hosted/office.js"></script>

    <!-- 3. RESTORE: Force restore the functions or provide "no-op" versions to prevent crashes -->
    <script>
        if (!window.history.pushState) {
            window.history.pushState = window._historyBackup.pushState || function() { 
                console.warn("pushState is not supported or was blocked"); 
            };
        }
        if (!window.history.replaceState) {
            window.history.replaceState = window._historyBackup.replaceState || function() { 
                console.warn("replaceState is not supported or was blocked"); 
            };
        }
    </script>
</head>

<body style="width: 100%; height: 100%; margin: 0; padding: 0;">
    <div id="container"></div>

    <div id="tridentmessage" style="display: none; padding: 10px;">
        This add-in will not run in your version of Office. Please upgrade...
    </div>

    <script>
        // Check for IE/Legacy Edge
        if ((navigator.userAgent.indexOf("Trident") !== -1) || (navigator.userAgent.indexOf("Edge") !== -1)) {
            document.getElementById("tridentmessage").style.display = "block";
            document.getElementById("container").style.display = "none";
        } 
    </script>
</body>
</html>
